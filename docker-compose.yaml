services:
  bot:
    build: .
    restart: unless-stopped
    stop_signal: SIGINT
    ports:
      - "127.0.0.1:8011:8011"
    env_file: .env
    environment:
      - PYTHONUNBUFFERED=1
    volumes:
      - ./database:/app/database
      - ./content:/app/content:ro
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
