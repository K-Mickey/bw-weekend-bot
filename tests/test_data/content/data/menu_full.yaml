id: menu_full
posts:
  - id: post_text
    media:
      - type: text
        text: Hello world
    keyboard:
      - - text: "Button 1"
          target: button_1
      - - text: "Button 2"
          target: button_2
    flags:
      is_back: false
      is_main: false

  - id: post_media
    media:
      - type: photo
        local_path: some_photo.jpg
        description: "real photo"
      - type: video
        local_path: some_video.mp4
        description: "real video"
